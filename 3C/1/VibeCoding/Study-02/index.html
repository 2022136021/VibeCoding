<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Daily Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header-wrap">
            <h1>My Tasks</h1>
            <button id="themeToggle" class="theme-btn">🌙 다크 모드</button>
        </div>

        <div class="dashboard">
            <div class="progress-area">
                <div class="progress-labels">
                    <span class="progress-label-left">전체 진행률</span>
                    <span id="progressFractionText">0/0 완료 (0%)</span>
                </div>
                <div class="main-progress-bar-bg">
                    <div id="mainProgressBar" class="main-progress-bar-fill"></div>
                </div>
            </div>

            <div class="stats-area">
                <div class="category-cards-container">
                    <div class="category-card work">
                        <div class="card-border-left"></div>
                        <div class="card-content">
                            <span class="card-label">업무</span>
                            <span id="workProgressText" class="card-fraction">0/0</span>
                            <div class="card-bar-bg">
                                <div id="workProgressBarFill" class="card-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="category-card personal">
                        <div class="card-border-left"></div>
                        <div class="card-content">
                            <span class="card-label">개인</span>
                            <span id="personalProgressText" class="card-fraction">0/0</span>
                            <div class="card-bar-bg">
                                <div id="personalProgressBarFill" class="card-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="category-card study">
                        <div class="card-border-left"></div>
                        <div class="card-content">
                            <span class="card-label">공부</span>
                            <span id="studyProgressText" class="card-fraction">0/0</span>
                            <div class="card-bar-bg">
                                <div id="studyProgressBarFill" class="card-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="today-count-area">
                    <span class="today-label">오늘 추가</span>
                    <span id="todayCountText" class="today-value">0개</span>
                </div>
            </div>
        </div>

        <div class="filter-and-sort">
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">전체 (Alt+1)</button>
                <button class="filter-btn" data-filter="work">업무 (Alt+2)</button>
                <button class="filter-btn" data-filter="personal">개인 (Alt+3)</button>
                <button class="filter-btn" data-filter="study">공부 (Alt+4)</button>
            </div>

            <select id="sortSelect" class="sort-select">
                <option value="newest">최신순</option>
                <option value="oldest">오래된순</option>
                <option value="category">카테고리순</option>
            </select>
        </div>

        <div class="input-section">
            <select id="categorySelect">
                <option value="work">업무</option>
                <option value="personal">개인</option>
                <option value="study">공부</option>
            </select>
            <input type="text" id="taskInput" placeholder="할 일을 입력하세요... (단축키: Alt+N)">
            <button id="addButton">추가</button>
        </div>

        <ul id="taskList"></ul>

        <p class="guide-text">💡 텍스트를 더블클릭하면 수정할 수 있습니다.</p>
        <div class="list-controls">
            <div class="data-actions">
                <button id="exportBtn" class="data-btn">📤 내보내기</button>
                <button id="importBtn" class="data-btn">📥 가져오기</button>
                <input type="file" id="importInput" accept=".json" style="display: none;">
            </div>
            <button id="clearCompletedBtn" class="clear-btn">완료된 항목 삭제</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
